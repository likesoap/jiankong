#!/usr/sbin/nft -f

flush ruleset

# ============================================================
# 接口定义 — 请根据实际网口名修改
# ============================================================

define LAN_IF   = eth1
define WAN_IF   = eth0
define LAN_NET  = 10.0.0.0/24

# ============================================================
# IP 黑名单 (补充要封的 IP 或网段)
# 来源建议: blocklist.de, Emerging Threats, FireHOL
# ============================================================

define BLOCKED_IPS = {
    # 示例 — 请替换为实际需要封锁的 IP
    # 11.22.33.44,
    # 5.6.0.0/16,
}

# ============================================================
# SNI 黑名单 (TLS ClientHello 域名匹配)
# 即使浏览器用 IP 直连, TLS 握手的 SNI 也会暴露真实域名
# 支持最多 ~100 条 (过多用 set 加速)
# ============================================================

define BLOCKED_SNI = {
    # 成人
    "pornhub.com",
    "xvideos.com",
    "xhamster.com",
    "youporn.com",
    "redtube.com",
    "xnxx.com",
    "spankbang.com",
    "eporner.com",
    "porntrex.com",
    "hclips.com",
    "upornia.com",
    "txxx.com",
    "beeg.com",
    # 社交媒体
    "tiktok.com",
    "douyin.com",
    "kuaishou.com",
}


# ============================================================
# inet filter: 入站 + 转发 + 出站
# ============================================================
table inet filter {

    # --------------------------------------------------------
    # 入站 (保护网关自身)
    # --------------------------------------------------------
    chain input {
        type filter hook input priority 0; policy drop;

        iif lo accept
        ct state established,related accept

        # AdGuard Home: DNS + DoT
        iif $LAN_IF udp dport 53 accept
        iif $LAN_IF tcp dport 53 accept
        iif $LAN_IF tcp dport 853 accept

        # Web 面板
        iif $LAN_IF tcp dport 80 accept
        iif $LAN_IF tcp dport 3000 accept
        iif $LAN_IF tcp dport 3001 accept

        # SSH
        iif $LAN_IF tcp dport 22 accept

        # ICMP
        iif $LAN_IF icmp type { echo-request, destination-unreachable, time-exceeded } accept
        ip protocol icmp icmp type { echo-request, destination-unreachable, time-exceeded } accept

        # IPv6 ND
        icmpv6 type { nd-neighbor-solicit, nd-router-advert, nd-neighbor-advert } accept

        counter drop
    }

    # --------------------------------------------------------
    # 转发 (LAN ↔ WAN, 核心过滤)
    # --------------------------------------------------------
    chain forward {
        type filter hook forward priority 0; policy drop;

        ct state established,related accept
        ct state invalid drop

        # === Layer 2: DNS 强制劫持 ===
        # 所有 LAN 发起的 DNS 查询强制转回本机 AdGuard Home
        iif $LAN_IF ip daddr != 127.0.0.1 udp dport 53 redirect to :53
        iif $LAN_IF ip daddr != 127.0.0.1 tcp dport 53 redirect to :53

        # === 封锁 DNS-over-TLS / QUIC ===
        tcp dport 853 log prefix "DOT-blocked: " drop
        udp dport 853 log prefix "DOQ-blocked: " drop

        # === Layer 3: IP 黑名单 ===
        ip daddr $BLOCKED_IPS log prefix "IP-blocked: " counter drop

        # === Layer 4: SNI 过滤 (HTTPS) ===
        tcp dport 443 tls sni $BLOCKED_SNI log prefix "SNI-blocked: " counter drop

        # === 放行正常流量 ===
        iif $LAN_IF oif $WAN_IF accept
        iif $LAN_IF oif $LAN_IF accept
    }

    # --------------------------------------------------------
    # 出站 (网关自身访问外网, 默认放行)
    # --------------------------------------------------------
    chain output {
        type filter hook output priority 0; policy accept;
    }
}


# ============================================================
# ip nat: SNAT for LAN → WAN
# ============================================================
table ip nat {
    chain postrouting {
        type nat hook postrouting priority 100; policy accept;
        oif $WAN_IF masquerade
    }
}


