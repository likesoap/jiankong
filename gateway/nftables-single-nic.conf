#!/usr/sbin/nft -f

flush ruleset

# ============================================================
# 单网口旁路模式 — N100 仅作 filter + DNS，NAT 由路由器负责
# 同一网口进出, 无 NAT, 无 masquerade
# ============================================================

define LAN_IF   = eth0
define ROUTER_IP = 192.168.1.254

# ============================================================
# IP 黑名单
# ============================================================

define BLOCKED_IPS = {
    # 示例 — 请替换为实际需要封锁的 IP
    # 11.22.33.44,
    # 5.6.0.0/16,
}

# ============================================================
# SNI 黑名单
# ============================================================

define BLOCKED_SNI = {
    # 成人
    "pornhub.com",
    "xvideos.com",
    "xhamster.com",
    "youporn.com",
    "redtube.com",
    "xnxx.com",
    "spankbang.com",
    "eporner.com",
    "porntrex.com",
    "hclips.com",
    "upornia.com",
    "txxx.com",
    "beeg.com",
    # 社交媒体
    "tiktok.com",
    "douyin.com",
    "kuaishou.com",
}


# ============================================================
# inet filter
# ============================================================
table inet filter {

    chain input {
        type filter hook input priority 0; policy drop;

        iif lo accept
        ct state established,related accept

        # AdGuard Home: DNS + DoT
        udp dport 53 accept
        tcp dport 53 accept
        tcp dport 853 accept

        # Web 面板
        tcp dport 80 accept
        tcp dport 3000 accept
        tcp dport 3001 accept

        # SSH
        tcp dport 22 accept

        # ICMP
        icmp type { echo-request, destination-unreachable, time-exceeded } accept
        icmpv6 type { nd-neighbor-solicit, nd-router-advert, nd-neighbor-advert } accept

        counter drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;

        ct state established,related accept
        ct state invalid drop

        # === DNS 劫持: 所有 53 端口流量 → 本机 AdGuard ===
        # 不区分接口: 旁路模式下进出都是同一网口
        ip daddr != 127.0.0.1 udp dport 53 redirect to :53
        ip daddr != 127.0.0.1 tcp dport 53 redirect to :53

        # === 封锁 DoT / DoQ ===
        tcp dport 853 log prefix "DOT-blocked: " drop
        udp dport 853 log prefix "DOQ-blocked: " drop

        # === IP 黑名单 ===
        ip daddr $BLOCKED_IPS log prefix "IP-blocked: " counter drop

        # === SNI 过滤 ===
        tcp dport 443 tls sni $BLOCKED_SNI log prefix "SNI-blocked: " counter drop

        # === 放行其余流量 ===
        accept
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}


